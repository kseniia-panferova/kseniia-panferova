<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="site-brand">
        <h1 class="site-title">Kseniia Panferova(under construction)</h1>
        <p class="site-subtitle">Portfolio</p>
      </div>

      <nav class="site-nav">
        <a href="cv.html">CV</a>
        <a href="mailto:kseniia.panferova.work@gmail.com">Contact</a>
      </nav>
    </div>
  </header>

  <main id="projects-root" class="projects-root"></main>

  <script src="projects.js"></script>
  <script>
    const typeMap = {
      C: "Competition",
      S: "Study",
      A: "Art",
      I: "Independent",
      W: "Work"
    };

    const typeOrder = ["W", "C", "S", "A", "I"];

    const sortedProjects = [...projects].sort((a, b) => {
      if (b.year !== a.year) return b.year - a.year;
      return a.title.localeCompare(b.title);
    });

    const groupedProjects = {};

    typeOrder.forEach(type => {
      groupedProjects[type] = [];
    });

    sortedProjects.forEach(project => {
      if (groupedProjects[project.type]) {
        groupedProjects[project.type].push(project);
      }
    });

    const root = document.getElementById("projects-root");

    typeOrder.forEach(type => {
      const items = groupedProjects[type];
      if (!items.length) return;

      const section = document.createElement("section");
      section.className = "project-group";

      const heading = document.createElement("h2");
      heading.className = "project-group-title";
      heading.textContent = typeMap[type];

      const grid = document.createElement("div");
      grid.className = "projects-grid";

      items.forEach(project => {
        const card = document.createElement("a");
        card.className = "project-card";
        card.href = `projects/${project.slug}/`;

        card.innerHTML = `
          <img src="${project.cover}" alt="${project.title} cover">
          <div class="project-meta">
            <span class="project-year">${project.year}</span>
            <h3>${project.title}</h3>
          </div>
        `;

        grid.appendChild(card);
      });

      section.appendChild(heading);
      section.appendChild(grid);
      root.appendChild(section);
    });
  </script>
</body>
</html>
