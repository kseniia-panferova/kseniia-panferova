name: Update gallery indexes

on:
  push:
    branches:
      - main
    paths:
      - 'assets/drawings/**'
      - 'assets/photography/**'
      - 'scripts/generate_gallery.py'
      - '.github/workflows/update-galleries.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-galleries:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate gallery data files
        run: python scripts/generate_gallery.py

      - name: Commit updated gallery files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add drawings.js photography.js

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update gallery indexes"
          git push
